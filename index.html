<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voting Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Voting Portal</h1>
      <p>Please sign in with your unique voting password to cast your vote.</p>

      <form id="voterLoginForm">
        <label for="voterPassword">Enter Voting Password</label>
        <input type="password" id="voterPassword" placeholder="Enter your password" required />
        <button type="submit">Sign In to Vote</button>
      </form>

      <div class="divider"></div>

      <button class="admin-btn" onclick="goToAdmin()">Admin</button>
      <p id="loginMessage" class="message"></p>
    </div>
  </div>

  <script src="passwords.js"></script>
  <script src="script.js"></script>
</body>
</html>
